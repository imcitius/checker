name: Test Stand

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  teststand:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start test stand infrastructure
        run: cd test/teststand && docker compose up -d --build --wait

      - name: Run checker inside docker-compose network
        run: |
          cd test/teststand
          docker compose --profile run run --rm checker 2>&1 | tee /tmp/checker-testrun.log
          # Extract exit code from checker output
          grep -q "Passed: 0" /tmp/checker-testrun.log && exit 1 || true

      - name: Validate results
        run: |
          # The NDJSON file is written inside the container to /tmp which is mounted
          bash test/teststand/validate.sh /tmp/checker-test-report.ndjson test/teststand/expectations.json

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: teststand-failure-artifacts
          path: /tmp/checker-test-report.ndjson
          if-no-files-found: ignore

      - name: Collect docker logs on failure
        if: failure()
        run: cd test/teststand && docker compose logs > /tmp/docker-compose.log 2>&1 || true

      - name: Upload docker logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: teststand-docker-logs
          path: /tmp/docker-compose.log
          if-no-files-found: ignore

      - name: Tear down test stand
        if: always()
        run: cd test/teststand && docker compose down -v --remove-orphans
