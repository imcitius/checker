name: Publish Helm Chart

on:
  release:
    types: [published]

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from release tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          CHART_VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "chart_version=$CHART_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          helm package charts/checker-edge \
            --version "${{ steps.version.outputs.chart_version }}" \
            --app-version "${{ steps.version.outputs.version }}" \
            -d .helm-out/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Update Helm repo index
        run: |
          cp .helm-out/*.tgz gh-pages/
          cd gh-pages
          helm repo index . --url "https://imcitius.github.io/checker"

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish Helm chart ${{ steps.version.outputs.chart_version }}" || true
          git push origin gh-pages

      - name: Attach chart to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.version }}" \
            .helm-out/*.tgz \
            --clobber
