---
name: Publish Helm Chart

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "charts/**"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  lint-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push to gh-pages branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Lint chart
        run: helm lint charts/checker-edge

      - name: Set release version
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_NO_V="${VERSION#v}"
          # Update Chart.yaml appVersion
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION_NO_V}\"/" charts/checker-edge/Chart.yaml
          # Update Chart.yaml version to match
          sed -i "s/^version:.*/version: ${VERSION_NO_V}/" charts/checker-edge/Chart.yaml
          # Update default image tag in values.yaml
          sed -i "s/^  tag:.*/  tag: ${VERSION_NO_V}/" charts/checker-edge/values.yaml

      - name: Package chart
        run: |
          mkdir -p .helm-packages
          helm package charts/checker-edge -d .helm-packages/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          # Create the branch automatically if it doesn't exist yet
          fetch-depth: 0

      - name: Copy packaged chart and rebuild index
        run: |
          cp .helm-packages/*.tgz gh-pages/
          helm repo index gh-pages/ --url https://imcitius.github.io/checker --merge gh-pages/index.yaml

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: publish Helm chart from ${{ github.sha }}"
          git push origin gh-pages
