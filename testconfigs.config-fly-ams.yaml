projects:
  Jupiter:
    healthchecks:
      System checks:
        checks:
          Mattermost:
            type: http
            url: https://mattermost.jgit.me/api/v4/system/ping
            answer: status":"OK
            code:
              - 200
            timeout: 2s
          Zimbra SMTP:
            type: tcp
            host: mail.relay4.xyz
            timeout: 5s
            port: 25
  Admitlead:
    parameters:
      noncrit_alert: abchecker_prod
      crit_alert: abchecker_prod
    healthchecks:
      Admitlead ks:
        parameters:
          duration: 60s
        checks:
          web:
            type: http
            url: https://admitlead.com/main/check
            answer: AdmitLead OK
            code:
              - 200
            timeout: 3s
            severity: critical

  BubblesMedia:
    parameters:
      noncrit_alert: abchecker_prod
      crit_alert: abchecker_prod
    healthchecks:
      Bubbles ks:
        parameters:
          duration: 60s
        checks:
          main-1:
            type: http
            url: http://1.bubblesmedia.net/main/check
            answer: Bubbles OK
            code:
              - 200
            timeout: 10s

          main-2:
            type: http
            url: http://2.bubblesmedia.net/main/check
            answer: Bubbles OK
            code:
              - 200
            timeout: 10s

          main-common:
            type: http
            url: http://bubblesmedia.net/main/check
            answer: Bubbles OK
            code:
              - 200
            timeout: 10s
            severity: critical

      BubblesMedia content:
        parameters:
          duration: 60s
        checks:
          bubbles-invoke.php:
            type: http
            url: https://bubblesmedia.net/invoke.php?id=42
            answer: (?is)<script>.*</script>
            code:
              - 200
            timeout: 10s
            severity: critical

      BubblesMedia promo_code:
        parameters:
          duration: 60s
        checks:
          stat-display-42:
            type: http
            url: https://stat.bubblesmedia.net/display/42/0
            answer: promo_code
            code:
              - 200
            timeout: 10s
            severity: critical
          stat-display-4822:
            type: http
            url: http://bubblesmedia.net/display/4822/0/
            answer: promo_code
            code:
              - 200
            timeout: 10s
            severity: critical

  Mediaget:
    parameters:
      noncrit_alert: mg_prod
      crit_alert: mg_prod
      duration: 60s
    healthchecks:
      Site:
        checks:
          website.ping:
            type: http
            url: https://mediaget.com/ping
            answer: pong
            code:
              - 200
            timeout: 10s
            severity: critical
      Client:
        checks:
          check.php:
            type: http
            url: https://mediaget.com/client/check.php
            answer: ProjectM2Client OK
            code:
              - 200
            timeout: 10s
            severity: critical
          checks_db:
            type: http
            url: https://mediaget.com/client/check_db.php
            answer: ProjectM2ClientDB OK
            code:
              - 200
            timeout: 10s
            severity: critical
          update version:
            type: http
            name: 'Mediaget Update version'
            url: https://client.mediaget.com/start?id=250123462&version=2.01.3793
            answer: "TORRENT https://mediaget.com/installer/torrent/update-3.01.4059.torrent"
            code:
              - 200
            timeout: 10s
          client.php:
            type: http
            url: https://mediaget.com/client/client.php
            answer: <Status>500</Status>
            code:
              - 200
            timeout: 10s

      LD:
        checks:
          check.php:
            type: http
            url: https://mediaget.com/ld/check.php
            answer: ProjectM2Ld OK
            code:
              - 200
            timeout: 10s
            severity: critical
          get_data.php:
            type: http
            url: https://mediaget.com/ld/get_data.php?id=1
            answer: <parameters>
            code:
              - 200
            timeout: 10s

      Catalogue API:
        checks:
          healthcheck:
            type: http
            url: https://mediaget.com/api/healthcheck
            answer: API OK
            code:
              - 200
            timeout: 10s
            severity: critical
      DHT:
        parameters:
          duration: 900s
        checks:
          healthcheck.liveness:
            type: http
            url: https://mediaget.com/dht/v1/healthcheck/liveness
            answer: I'm alive
            code:
              - 200
            timeout: 10s
          MG2ApiDHTSearch:
            type: http
            name: MG2ApiDHTSearch
            url: https://mediaget.com/dht/v1/torrents/search?q=avatar&page=1&page_size=10
            answer: (?is)avatar
            code:
              - 200
            timeout: 10s
          MG2ApiDHTMoviesID:
            type: http
            name: MG2ApiDHTMoviesID
            url: https://mediaget.com/dht/v1/torrents/movies/384436?lang=en&page=1&page_size=10
            answer: (?is)avatar
            code:
              - 200
            timeout: 10s
      DHT external:
        checks:
          163.172.108.18:
            type: tcp
            host: 163.172.108.18
            timeout: 5s
            port: 22468
          163.172.68.216:
            type: tcp
            host: 163.172.68.216
            timeout: 5s
            port: 22468

      Landings:
        checks:
          are-you-alive:
            type: http
            url: https://land.mediaget.com/api/are-you-alive
            answer: Landings OK
            code:
              - 200
            timeout: 10s
            severity: critical
          healthtest:
            type: http
            url: https://land.mediaget.com/healthtest/
            answer: Ваш файл готов к скачиванию
            code:
              - 200
            timeout: 10s
      Similarity API:
        checks:
          similarity.healthcheck:
            type: http
            url: https://mediaget.com/similarity/healthcheck
            answer: searcher-similarity OK
            code:
              - 200
            timeout: 10s
          searcher.healthcheck:
            type: http
            url: https://mediaget.com/search/healthcheck
            answer: searcher-search OK
            code:
              - 200
            timeout: 10s
      Update HashServer:
        checks:
          update.php:
            type: http
            url: https://hash-server.com/update.php?version=2.01.3780
            answer: 2a2672ad7f33ed65172ddaebef481de6f98e34c6
            code:
              - 200
            timeout: 10s
      Download hash:
        checks:
          #          - type: getfile
          #            name: mediaget-lib
          #            url: https://download.mediaget.com/mediaget-installer-2/binaries/download.php?a=mediaget-lib
          #            hash: cd32f76f2f15154ad63340bba2067744
          #          - type: getfile
          #            name: Ld
          #            url: https://ld.mediaget.com
          #            hash: 80201bb326ea1a53d758d7655fa4d6b7
          binaries-3941:
            type: getfile
            url: https://mediaget.com/installer/binaries/4212.7z
            hash: d6d8c18192a1ce74f6dc9698f3df4f96
          mediaget-lib-bundle:
            type: getfile
            url: https://mediaget.com/installer/binaries/mediaget-lib-2020-12-27-qt5152-no-ogl.7z
            hash: ac44c044d19ca3bb9ca3799d4466bb79
          get-installer:
            type: getfile
            url: https://mediaget.com/ld/get_installer.php?unlimit=1
            hash: 0b2dbacd9c3dbada28122b6100b027d8

      MG2Parser:
        checks:
          content error:
            type: http
            url: https://mediaget.com/parser/update.ini
            answer: search_server
            code:
              - 200
            timeout: 10s
      msearch:
        checks:
          web:
            type: http
            url: https://msearch.mediaget.com
            code:
              - 302
              - 200
            timeout: 10s

