apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "checker-edge.fullname" . }}
  labels:
    {{- include "checker-edge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "checker-edge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "checker-edge.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "checker-edge.serviceAccountName" . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: checker-edge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: CHECKER_SAAS_URL
              value: {{ .Values.saasUrl | quote }}
            - name: CHECKER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "checker-edge.apiKeySecretName" . }}
                  key: {{ include "checker-edge.apiKeySecretKey" . }}
            - name: CHECKER_EDGE_REGION
              value: {{ .Values.region | quote }}
            - name: CHECKER_EDGE_WORKERS
              value: {{ .Values.workers | quote }}
            - name: CHECKER_EDGE_HEALTH_PORT
              value: {{ .Values.healthPort | quote }}
            - name: CHECKER_EDGE_HEARTBEAT_INTERVAL
              value: {{ .Values.heartbeatInterval | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.healthPort }}
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.healthPort }}
            initialDelaySeconds: 3
            periodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
