# fly-edge.toml — Fly.io deployment config for the edge checker worker
#
# The edge binary is a headless WebSocket client (outbound-only). It does NOT
# expose a public-facing service. A minimal health check HTTP server listens
# internally on port 9091 for Fly.io liveness probes.
#
# Deploy:
#   fly deploy -a <your-app-name> --config fly-edge.toml
#
# Before deploying, set required secrets:
#   fly secrets set CHECKER_SAAS_URL=wss://your-saas-host/ws/edge
#   fly secrets set CHECKER_API_KEY=your-api-key

app = "checker-edge"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.edge"

# VM size — edge worker is lightweight
[vm]
  size = "shared-cpu-1x"
  memory = "256mb"

# Worker process
[processes]
  app = "/usr/local/bin/checker-edge"

# Environment variables
# CHECKER_SAAS_URL and CHECKER_API_KEY must be set via `fly secrets set`
[env]
  CHECKER_EDGE_REGION = "fly-edge"
  # CHECKER_EDGE_WORKERS = "10"       # Optional: concurrent check workers (default: 10)
  # CHECKER_EDGE_HEALTH_PORT = "9091" # Optional: health check port (default: 9091)

# HTTP service — required for Fly.io to grant full network routing (including
# outbound internet access). The edge binary does NOT expose a public service,
# but declaring [http_service] on the internal health-check port ensures the
# machine receives proper routing. auto_stop/auto_start replace [machines].
[http_service]
  internal_port = 9091
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  processes = ["app"]
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
